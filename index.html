<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сватбата на Виктория и Любомир</title>
<style>
body { margin: 0; font-family: 'Georgia', serif; text-align: center; background: #fff; }

/* Екран с плитката */
#envelope-screen {
  height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #fdfaf7; position: fixed; width: 100%; z-index: 1000; transition: opacity 0.8s;
}
.envelope { width: 300px; height: 200px; background: #a9a39a; position: relative; cursor: pointer; border-radius: 4px; }
.flap { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #b6afa6; clip-path: polygon(0 0, 100% 0, 50% 60%); transform-origin: top; transition: transform 1s; z-index: 2; }
.wax-seal { position: absolute; top: 52%; left: 50%; transform: translate(-50%, -50%); width: 50px; height: 50px; background: #d4af37; border-radius: 50%; z-index: 3; }

#main-site { display: none; animation: fadeIn 1.5s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ГЛАВНАТА СЕКЦИЯ СЪС СНИМКАТА */
header {
  background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
              url('my-photo.jpg') center/cover no-repeat;
  height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start; /* Подрежда отгоре надолу */
  color: white;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
  box-sizing: border-box;
  padding-top: 50px; /* Разстояние от самия връх на снимката */
}

header h1 { font-size: 42px; margin: 0; padding: 0 10px; }
header h2 { font-size: 26px; margin: 15px 0; font-weight: normal; color: #f9edea; }

.invite-text {
  font-size: 20px;
  line-height: 1.5;
  max-width: 85%;
  margin: 40px 0 20px 0; /* Голямо разстояние под датата */
  background: rgba(0,0,0,0.2); /* Лека сянка за по-добра четливост */
  padding: 15px;
  border-radius: 10px;
}

.kumuvani {
  font-size: 22px;
  font-style: italic;
  margin-top: 30px; /* Фиксирано разстояние под поканата */
  font-weight: bold;
  display: block;
}

/* МОБИЛНА ОПТИМИЗАЦИЯ */
@media (max-width: 480px) {
  header { padding-top: 30px; }
  header h1 { font-size: 32px; }
  header h2 { font-size: 22px; }
  .invite-text { font-size: 17px; margin: 20px 0; }
  .kumuvani { font-size: 19px; margin-top: 20px; }
}

/* Секциите надолу */
section { padding: 50px 20px; max-width: 800px; margin: auto; }
h2.section-title { color: #8b5e3c; font-size: 32px; margin-bottom: 20px; }
.map-link { display: inline-block; padding: 12px 25px; background: #a9a39a; color: white; text-decoration: none; border-radius: 5px; font-weight: bold; margin-top: 15px; }
footer { padding: 40px; background: #f7f7f7; font-size: 16px; color: #777; }
</style>
</head>
<body>

<audio id="bg-music" loop><source src="https://github.com/lyubomir95/wedding/raw/refs/heads/main/music.mp3" type="audio/mpeg"></audio>

<div id="envelope-screen">
  <div class="envelope" onclick="openEnvelope()">
    <div class="flap" id="f"></div><div class="wax-seal" id="s"></div>
    <div style="position:absolute; bottom:20px; width:100%; color:white; font-style:italic; font-size:12px;">Докосни, за да отвориш</div>
  </div>
</div>

<div id="main-site">
<header>
  <h1>Виктория & Любомир</h1>
  <h2>22.08.2026</h2>
  
  <p class="invite-text">
    С огромна радост Ви каним да споделите<br>
    най-щастливия ден в живота ни,<br>
    нашата сватба!
  </p>
  
  <p class="kumuvani">Кумуват: Ивона & Антонио</p> 
</header>

<section>
  <h2 class="section-title">Кога и Къде?</h2>
  <p>Очакваме ви на <strong>22.08.2026 г.</strong> в 17:30 ч.</p>
  <p>Ресторант "Корията", гр. София</p>
  <a href="https://maps.google.com" target="_blank" class="map-link">📍 ЛОКАЦИЯ</a>
</section>

<footer><p>С обич: Виктория и Любомир</p></footer>
</div>

<script>
function openEnvelope(){
  document.getElementById("bg-music").play().catch(() => {});
  document.getElementById("f").style.transform="rotateX(180deg)";
  document.getElementById("s").style.opacity="0";
  setTimeout(()=>{
    document.getElementById("envelope-screen").style.opacity="0";
    setTimeout(()=>{
      document.getElementById("envelope-screen").style.display="none";
      document.getElementById("main-site").style.display="block";
      window.scrollTo(0,0);
    },800);
  },1000);
}
</script>
</body>
</html>
